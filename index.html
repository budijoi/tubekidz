<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DilDulTube - Video Aman untuk Anak</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-row">
        <div class="logo" id="logoLink">&#9733; DilDulTube</div>
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Cari video anak-anak..." autocomplete="off">
          <button id="searchBtn">Cari</button>
        </div>
      </div>
      <nav class="nav-bar" id="mainNav">
        <span class="nav-link active" data-view="home">Beranda</span>
        <span class="nav-link" data-view="categories">Kategori</span>
        <div class="nav-right">
          <span class="refresh-link" id="refreshBtn" title="Perbarui RSS">↻</span>
          <span class="countdown" id="countdownDisplay">⏱ 59:59</span>
        </div>
      </nav>
    </div>
  </header>

  <div class="container">
    <div id="protocolBanner" class="protocol-banner" style="display:none;"></div>
  </div>
  <main class="container">
    <div id="viewContent"></div>
  </main>

  <div class="fullscreen-player" id="fullscreenPlayer">
    <div class="fp-header">
      <button class="fp-close" id="fpClose">&larr; Kembali</button>
      <div class="fp-info">
        <span class="fp-title" id="fpTitle"></span>
        <span class="fp-channel" id="fpChannel"></span>
      </div>
    </div>
    <div class="fp-video-wrap" id="videoWrapper"></div>
    <div id="fallbackMsg" class="fallback-msg" style="display:none;">
      <p>Video tidak dapat diputar di sini.</p>
      <a id="ytLink" href="#" target="_blank" rel="noopener" class="btn-yt">&#9654; Tonton di YouTube</a>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>DilDulTube &mdash; Tayangan aman untuk buah hati tercinta</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
